name: Update Badge in README

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  actions: read

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update badge
        run: |
          response=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/traffic/views)

          views=$(echo "$response" | jq '.count // 0')

          # fallback extra
          if [ "$views" = "null" ] || [ -z "$views" ]; then
            views=0
          fi

          sed -i "s|views-[^ -]*-brightgreen|views-$views-brightgreen|g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git diff --quiet || git commit -am "Update badge with views count"
          git push
